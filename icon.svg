<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient: deep purple to violet -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Laptop lid gradient (light indigo) -->
    <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>

    <!-- Laptop base gradient (silver/gray) -->
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>

    <!-- Lightning bolt glow filter -->
    <filter id="boltGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow for laptop -->
    <filter id="laptopShadow" x="-5%" y="-2%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e1b4b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <!-- macOS-style squircle (superellipse) — tighter corners than a circle -->
  <path d="
    M 462 64
    C 640 64 780 120 868 208
    C 956 296 960 436 960 512
    C 960 588 956 728 868 816
    C 780 904 640 960 462 960
    C 284 960 144 904 56 816
    C -32 728 -8 588 -8 512
    C -8 436 -32 296 56 208
    C 144 120 284 64 462 64
    Z
  " fill="url(#bgGrad)"/>

  <!-- ========== LAPTOP (Closed, front view) ========== -->
  <!-- Centered in the icon. Lid on top, base below, thin gap between. -->

  <!-- Laptop lid (screen back) — wider rectangle -->
  <rect x="198" y="256" width="628" height="280" rx="18" ry="18"
        fill="url(#lidGrad)" filter="url(#laptopShadow)"/>

  <!-- Subtle top edge highlight on lid -->
  <line x1="216" y1="258" x2="808" y2="258" stroke="#f1f5f9" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round"/>

  <!-- Gap between lid and base — thin dark line -->
  <rect x="198" y="538" width="628" height="5" rx="2.5" fill="#4338ca" opacity="0.5"/>

  <!-- Laptop base (keyboard half) — slightly wider, shorter -->
  <rect x="188" y="545" width="648" height="95" rx="12" ry="12"
        fill="url(#baseGrad)"/>

  <!-- Base bottom edge -->
  <line x1="198" y1="640" x2="826" y2="640" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Small notch/indent on base front edge (MacBook style) -->
  <rect x="442" y="632" width="140" height="3" rx="1.5" fill="#475569" opacity="0.4"/>

  <!-- ========== LIGHTNING BOLT (Awake indicator) ========== -->
  <!-- Centered on the laptop lid, golden/amber with glow -->
  <g filter="url(#boltGlow)">
    <path d="
      M 564 310
      L 468 450
      L 542 450
      L 490 520
      L 606 420
      L 536 420
      L 584 310
      Z
    " fill="#fbbf24" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Subtle glow ring around bolt -->
  <circle cx="544" cy="414" r="78" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
</svg>
