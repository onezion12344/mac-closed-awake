name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Electron app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 for DMG
        id: sha
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          HASH=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "dmg_path=$DMG" >> $GITHUB_OUTPUT
          echo "sha256=$HASH" >> $GITHUB_OUTPUT
          echo "DMG: $DMG"
          echo "SHA256: $HASH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacClosedAwake-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            ${{ steps.sha.outputs.dmg_path }}
          if-no-files-found: error

      - name: Print SHA256
        run: |
          echo "SHA256: ${{ steps.sha.outputs.sha256 }}"
          echo "Download: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MacClosedAwake-${{ github.ref_name }}.dmg"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
